<!DOCTYPE html>
<html>
<head>
    <title>AI Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>AI Habit Tracker</h1>

    <input type="text" id="habitInput" placeholder="Enter a new habit">

    <div class="buttons">
        <button onclick="addHabit()">Add Habit</button>
        <button onclick="loadHabits()">View Habits</button>
        <button onclick="deleteHabits()">Delete All</button>
        <button onclick="streamHabits()">Stream Habits</button>
    </div>

    <div id="output"></div>
</div>

<script src="script.js"></script>

</body>
</html>
